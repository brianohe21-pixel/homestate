name: Deploy to shared hosting (FTP)

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-ftp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create mail config
        run: |
          cat > mail-config.php <<EOF
          <?php
          return [
            'smtp_host' => 'smtp.gmail.com',
            'smtp_port' => 587,
            'smtp_user' => '${{ secrets.SMTP_USER }}',
            'smtp_pass' => '${{ secrets.SMTP_PASSWORD }}',
            'mail_to' => 'condominioecologicoinfo@gmail.com',
            'from_email' => '${{ secrets.SMTP_USER }}',
            'from_name' => 'Condominio Ecológico',
            'site_url' => 'https://condominioecologico.com',
          ];
          EOF

      - name: FTP deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          timeout: 900000
          server-dir: ./
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/sass/**
          log-level: verbose
