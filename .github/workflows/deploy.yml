name: Deploy to shared hosting (FTP)

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-ftp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create mail config
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASSWORD }}
        run: |
          php <<'PHP'
          <?php
          $config = [
            'smtp_host' => 'smtp.gmail.com',
            'smtp_port' => 587,
            'smtp_user' => getenv('SMTP_USER') ?: '',
            'smtp_pass' => getenv('SMTP_PASS') ?: '',
            'mail_to' => 'condominioecologicoinfo@gmail.com',
            'from_email' => getenv('SMTP_USER') ?: '',
            'from_name' => 'Condominio Ecológico',
            'site_url' => 'https://condominioecologico.com',
          ];
          file_put_contents('mail-config.php', "<?php\nreturn " . var_export($config, true) . ";\n");
          if ($config['smtp_user'] === '' || $config['smtp_pass'] === '') {
            fwrite(STDERR, "Warning: SMTP_USER or SMTP_PASSWORD secrets are missing.\n");
          }
          PHP

      - name: FTP deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          timeout: 900000
          server-dir: ./
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/sass/**
          log-level: verbose
